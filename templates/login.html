<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - Magazyn SuuHouse</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><g stroke='%234a90e2' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'><path d='M10 45 L50 15 L90 45' /><path d='M25 45 L25 80 L75 80 L75 45' /></g></svg>">
    
    <style>
        body {
            font-family: 'Open Sans', 'Segoe UI', sans-serif;
            background: #131a25;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: none;
            border-radius: 20px;
            overflow: hidden;
            background: #1c2434;
            color: #e2e8f0;
        }
        
        .login-header {
            text-align: center;
            padding: 0 2rem;
        }

        .login-header p {
            color: #cbd5e1 !important;
        }
        
        .login-form {
            padding: 2rem;
        }

        .login-header h2 {
            font-size: 20px;
        }

        .login-header p,
        .login-form .form-label {
            font-size: 12px;
        }
        
        .login-form .form-control {
            font-size: 12px;
            background-color: #e8f0fe;
            border: 2px solid #2d3748;
            border-radius: 12px;
            color: #1a202c;
            padding: 0.6rem 1rem;
        }
        
        .login-form .btn {
            font-size: 12px;
            color: #fff;
            border-radius: 10px;
            padding: 0.6rem;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #4a90e2;
            background-color: #e8f0fe;
        }

        .toggle-password-btn {
            background: transparent;
            border: none;
            box-shadow: none;
            color: #3b82f6; /* niebieskie oczko */
        }

        .toggle-password-btn:hover {
            color: #ef4444; /* czerwone po najechaniu */
        }

        .toggle-password-btn:focus {
            outline: none;
            box-shadow: none;
        }

        .toggle-password-icon {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card login-card">
                    <div class="login-header mt-4">
                        <div class="mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="180" style="max-width: 100%;">
                                <g stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M15 45 L50 15 L85 45" />
                                    <path d="M25 45 L25 80 L75 80 L75 45" />
                                </g>
                                <text x="105" y="75" font-family="'Open Sans', 'Segoe UI', sans-serif" font-size="52" fill="white" font-weight="300" style="letter-spacing: 2px;">SUUHOUSE</text>
                            </svg>
                        </div>
                        <h2 class="mb-2">Niezbędnik v 0.1.1</h2>
                        <p class="text-muted mb-0">Zaloguj się, aby kontynuować</p>
                    </div>
                    
                    {% if error %}
                    <div class="alert alert-danger mx-4 mt-3 mb-0" role="alert">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        {{ error }}
                    </div>
                    {% endif %}
                    
                    <form method="POST" class="login-form" autocomplete="on">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Nazwa użytkownika</label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus autocomplete="username">
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Hasło</label>
                            <div class="position-relative">
                                <input type="password" class="form-control form-control-lg pe-5" id="password" name="password" required autocomplete="current-password">
                                <button type="button" class="position-absolute top-50 translate-middle-y end-0 me-3 p-0 toggle-password-btn" id="togglePassword" aria-label="Pokaż/ukryj hasło">
                                    <i class="bi bi-eye toggle-password-icon" id="togglePasswordIcon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="remember" name="remember">
                            <label class="form-check-label" for="remember">
                                Zapamiętaj login
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Zaloguj się
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap 5 JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('togglePassword');
        const toggleIcon = document.getElementById('togglePasswordIcon');

        toggleButton.addEventListener('click', () => {
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            toggleIcon.classList.toggle('bi-eye');
            toggleIcon.classList.toggle('bi-eye-slash');
        });

        const loginForm = document.querySelector('.login-form');
        const usernameInput = document.getElementById('username');
        const rememberCheckbox = document.getElementById('remember');
        const savedUsername = localStorage.getItem('mr_username');
        const savedRemember = localStorage.getItem('mr_remember') === '1';

        if (savedRemember && savedUsername) {
            usernameInput.value = savedUsername;
            rememberCheckbox.checked = true;
        }

        loginForm.addEventListener('submit', () => {
            if (rememberCheckbox.checked) {
                localStorage.setItem('mr_username', usernameInput.value || '');
                localStorage.setItem('mr_remember', '1');
            } else {
                localStorage.removeItem('mr_username');
                localStorage.removeItem('mr_remember');
            }
        });
    </script>
</body>
</html>
