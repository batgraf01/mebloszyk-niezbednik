function formatDims(dims) {
  return dims.map(d => d.toFixed(2)).join(' × ') + ' m';
}

function normalize(str) {
  return str
    .toLowerCase()
    .replace(/×/g, 'x')
    .replace(/\s+/g, '');
}

function renderProduct(productName, cartons) {
  return `
    <div class="col-12 col-md-6 col-lg-4 col-xl-3 product-item" data-name="${productName.toLowerCase()}">
      <div class="product-card">
        <div class="product-title">${productName}</div>
        <div class="cartons-box flex-grow-1">
          ${cartons.map((carton, idx) => `
            <div class="carton-item">
              <div class="carton-line">
                <span class="carton-number">${idx + 1}.</span>
                <span class="carton-dims">${formatDims(carton.dims)}</span>
                <span class="carton-weight">${carton.weight} kg</span>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid');
  const noResults = document.getElementById('noResults');
  
  if (products.length === 0) {
    grid.style.display = 'none';
    noResults.style.display = 'block';
    return;
  }
  
  grid.style.display = 'flex';
  noResults.style.display = 'none';
  grid.innerHTML = products.map(([name, cartons]) => renderProduct(name, cartons)).join('');
}

function filterProducts(searchTerm) {
  const term = searchTerm.toLowerCase().trim();
  if (!term) {
    return Object.entries(PRODUCTS);
  }

  const termNorm = normalize(term);
  const termTokens = term.split(/\s+/).filter(Boolean);

  return Object.entries(PRODUCTS).filter(([name]) => {
    const nameLower = name.toLowerCase();
    const nameNorm = normalize(name);

    // 1) pełny znormalizowany ciąg (np. "3x4" lub "3 x 4" -> "3x4") w nazwie
    if (termNorm && nameNorm.includes(termNorm)) return true;

    // 2) każde słowo z zapytania musi wystąpić w nazwie (zachowaj proste OR na norm)
    return termTokens.every(t => {
      const tNorm = normalize(t);
      return nameLower.includes(t) || nameNorm.includes(tNorm);
    });
  });
}

// Inicjalizacja
const SEARCH_PLACEHOLDER = 'Szukaj produktu... (np. Thor, Skyline, Roleta)';
document.addEventListener('DOMContentLoaded', () => {
  const searchInput = document.getElementById('searchInput');
  
  // Placeholder znika po kliknięciu (focus), wraca przy blur jeśli pole puste
  searchInput.addEventListener('focus', () => { searchInput.placeholder = ''; });
  searchInput.addEventListener('blur', () => { if (!searchInput.value.trim()) searchInput.placeholder = SEARCH_PLACEHOLDER; });
  
  // Renderuj wszystkie produkty na start
  renderProducts(Object.entries(PRODUCTS));
  
  // Obsługa wyszukiwania
  searchInput.addEventListener('input', (e) => {
    const filtered = filterProducts(e.target.value);
    renderProducts(filtered);
  });
});
