<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - Magazyn SuuHouse</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Open Sans', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .login-brand {
            text-align: center;
            padding: 2rem 0 1rem;
        }
        
        .login-brand img {
            width: 140px;
            margin-bottom: 1rem;
        }
        
        .login-header {
            text-align: center;
            padding: 0 2rem;
        }
        
        .login-form {
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card login-card">
                    <div class="login-brand">
                        <img src="https://www.suuhouse.pl/images/suuhouse%20logo%20desktop.png" alt="SuuHouse" class="img-fluid">
                    </div>
                    
                    <div class="login-header">
                        <h2 class="mb-2">Magazyn</h2>
                        <p class="text-muted mb-4">Zaloguj się, aby kontynuować</p>
                    </div>
                    
                    {% if error %}
                    <div class="alert alert-danger mx-4 mb-3" role="alert">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        {{ error }}
                    </div>
                    {% endif %}
                    
                    <form method="POST" class="login-form">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Nazwa użytkownika</label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Hasło</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Zaloguj się
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap 5 JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
